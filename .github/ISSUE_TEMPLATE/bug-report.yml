name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please do not report security vulnerabilities here. Use SECURITY.md instead.
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: Paste the command you ran, if applicable.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, Node.js version, and npm version.
